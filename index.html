<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<title>Bản đồ vùng nguyên liệu &amp; cơ sở CPART</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --ink:#1c2b1f;
    --paper:#f6f4ee;
    --moss:#3d5c3a;
    --moss-dark:#2a4027;
    --clay:#b5651d;
    --clay-soft:#e7c9a8;
    --line:#d8d2c2;
    --panel:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;padding:0;}
  body{
    font-family:'Inter','Segoe UI',Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    overflow:hidden;
  }

  #app{position:relative;height:100vh;width:100vw;}
  #map{position:absolute;inset:0;z-index:1;}

  /* ---------- Header ---------- */
  #topbar{
    position:absolute;top:0;left:0;right:0;z-index:1000;
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;
    background:linear-gradient(180deg, rgba(28,43,31,0.92), rgba(28,43,31,0.0));
    pointer-events:none;
  }
  #topbar .brand{
    pointer-events:auto;
    display:flex;align-items:center;gap:10px;
    background:var(--panel);
    border-radius:999px;
    padding:8px 16px 8px 10px;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);
  }
  #topbar .brand .mark{
    width:30px;height:30px;border-radius:50%;
    background:var(--moss);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;
    font-family:Georgia,serif;
  }
  #topbar .brand .title{
    font-weight:600;font-size:14.5px;letter-spacing:0.2px;color:var(--ink);
    line-height:1.15;
  }
  #topbar .brand .sub{
    font-size:11px;color:#6b7268;font-weight:400;
  }

  #status-pill{
    pointer-events:auto;
    margin-left:auto;
    font-size:11.5px;
    background:var(--panel);
    border-radius:999px;
    padding:7px 14px;
    box-shadow:0 4px 14px rgba(0,0,0,0.18);
    color:#5d655a;
    display:flex;align-items:center;gap:6px;
  }
  #status-pill .dot{
    width:7px;height:7px;border-radius:50%;background:#9aa39a;
    transition:background .3s;
  }
  #status-pill .dot.ok{background:#4d8b4f;}
  #status-pill .dot.err{background:#b5462e;}
  #status-pill .dot.loading{background:#c79b3d;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  #status-pill button{
    border:none;background:transparent;color:var(--moss-dark);
    font-weight:600;font-size:11.5px;cursor:pointer;padding:0;margin-left:4px;
  }

  /* ---------- Layer panel ---------- */
  #layer-panel{
    position:absolute;left:14px;bottom:14px;z-index:1000;
    background:var(--panel);
    border-radius:14px;
    box-shadow:0 6px 20px rgba(0,0,0,0.18);
    width:268px;
    max-height:46vh;
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  #layer-panel .lp-head{
    padding:12px 14px 10px;
    border-bottom:1px solid var(--line);
    font-size:12px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;
    color:var(--moss-dark);
  }
  #layer-list{
    overflow-y:auto;padding:8px 6px;
  }
  .layer-group{margin-bottom:2px;}
  .layer-row{
    display:flex;align-items:center;gap:9px;
    padding:7px 8px;border-radius:9px;
    cursor:pointer;font-size:13px;
    user-select:none;
  }
  .layer-row:hover{background:#f1efe7;}
  .layer-row input{accent-color:var(--moss);width:15px;height:15px;cursor:pointer;}
  .layer-row .swatch{
    width:11px;height:11px;border-radius:3px;flex:0 0 auto;
  }
  .layer-row .swatch.dot{border-radius:50%;}
  .layer-row .lbl{flex:1;line-height:1.25;}
  .layer-row .count{
    font-size:11px;color:#8b9186;background:#eee9dd;
    padding:1px 7px;border-radius:999px;
  }

  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper{
    border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,0.22);
  }
  .leaflet-popup-content{margin:14px 16px;min-width:200px;}
  .popup-eyebrow{
    font-size:10.5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;
    color:var(--moss);margin-bottom:3px;
  }
  .popup-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.3;}
  .popup-row{font-size:12.5px;color:#4b5247;margin-bottom:3px;line-height:1.45;}
  .popup-row b{color:#2c332a;font-weight:600;}
  .popup-img{width:100%;border-radius:8px;margin-top:8px;display:block;}
  .popup-desc{margin-top:6px;font-size:12.5px;color:#555c50;line-height:1.5;}

  /* ---------- Empty / error state ---------- */
  #empty-state{
    position:absolute;z-index:1000;left:50%;top:50%;transform:translate(-50%,-50%);
    background:var(--panel);padding:22px 26px;border-radius:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
    max-width:320px;text-align:center;display:none;
  }
  #empty-state h3{margin:0 0 6px;font-size:15px;color:var(--ink);}
  #empty-state p{margin:0;font-size:12.5px;color:#6b7268;line-height:1.5;}

  /* ---------- Mobile ---------- */
  @media (max-width:640px){
    #layer-panel{width:calc(100vw - 28px);max-height:38vh;}
    #topbar .brand .sub{display:none;}
    #status-pill{font-size:10.5px;padding:6px 10px;}
  }

  .leaflet-control-zoom{margin-top:64px !important;}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="topbar">
    <div class="brand">
      <div class="mark">C</div>
      <div>
        <div class="title">Bản đồ vùng nguyên liệu &amp; cơ sở</div>
        <div class="sub">CPART — Trung tâm sản xuất sạch hơn</div>
      </div>
    </div>
    <div id="status-pill">
      <span class="dot loading" id="status-dot"></span>
      <span id="status-text">Đang tải dữ liệu…</span>
      <button id="refresh-btn" title="Tải lại dữ liệu">↻</button>
    </div>
  </div>

  <div id="layer-panel">
    <div class="lp-head">Lớp bản đồ</div>
    <div id="layer-list"></div>
  </div>

  <div id="empty-state">
    <h3>Chưa có dữ liệu hiển thị</h3>
    <p>Không tải được dữ liệu từ Google Sheets, hoặc chưa có dòng nào ở trạng thái "Active". Kiểm tra lại cấu hình SHEET_CSV_URL trong config.js.</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
